<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <!-- head icon link -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <!-- css link -->
  <link href="styles/stylesheet.css" rel="stylesheet">
  <link href="styles/mobile.css" rel="stylesheet">

  <!-- font-family links -->
  <link href="https://fonts.google.com/specimen/Poppins" rel="font-family">
  <link href="https://fonts.google.com/specimen/Open+Sans" rel="font-family">
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>

<body>
  <header>    
    <img src="images/logo.svg" alt="logo">
  </header>

  <main>
    <div class="hero-view">
      
        <img class="hero-img" src="images/illustration-mockups.svg" alt="illustration-mockups">
      
      <div class="content">
        <p class="headline-txt">Build The Community <br> Your Fans Will Love</p>
        <p>
          Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
          Create connections with your users as you engage in genuine discussion.
        </p>
        <button type="button" class="register-btn">Register</button>
      </div>
    </div>
  </main>

  <footer class="attribution">
    <div class="socials">    
      <i class="fa-brands fa-facebook-f"></i>

      <i class="fa-brands fa-twitter"></i>

      <i class="fa-brands fa-instagram"></i>
    </div>
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/Princesg-1506">Mastersolution Tech</a>.
  </footer>
</body>
</html>
